version: "3.9"

services:
  hellobooks:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PORT=5000
    volumes:
      - ./backend/faiss_index:/app/backend/faiss_index
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
